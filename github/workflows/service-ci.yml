name: Service CI/CD

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        working-directory: services/${{ inputs.service }}
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: services/${{ inputs.service }}
        run: if [ -d tests ]; then pytest; fi

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          SERVICE: ${{ inputs.service }}
        run: |
          docker build -t $ECR_REGISTRY/$SERVICE:$GITHUB_SHA -f ./services/$SERVICE/Dockerfile .
          docker tag $ECR_REGISTRY/$SERVICE:$GITHUB_SHA $ECR_REGISTRY/$SERVICE:latest
          docker push $ECR_REGISTRY/$SERVICE:$GITHUB_SHA
          docker push $ECR_REGISTRY/$SERVICE:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region us-east-1
      - name: Deploy
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          SERVICE: ${{ inputs.service }}
        run: kubectl set image deployment/$SERVICE $SERVICE=$ECR_REGISTRY/$SERVICE:$GITHUB_SHA