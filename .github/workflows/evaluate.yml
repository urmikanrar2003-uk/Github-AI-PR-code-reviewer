name: Evaluate

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push evaluate image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
        run: |
          docker build -t $ECR_REGISTRY/evaluate:latest -f Scripts/Dockerfile .
          docker push $ECR_REGISTRY/evaluate:latest

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region us-east-1

      - name: Delete old job if exists
        run: kubectl delete job evaluate --ignore-not-found

      - name: Run evaluation job
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
        run: |
          sed "s|IMAGE_PLACEHOLDER|$ECR_REGISTRY/evaluate:latest|g" infra/k8s/evaluate-job.yaml | kubectl apply -f -

      - name: Wait for job
        run: kubectl wait --for=condition=complete --for=condition=failed job/evaluate --timeout=600s

      - name: Print logs
        if: always()
        run: kubectl logs job/evaluate

      - name: Cleanup
        if: always()
        run: kubectl delete job evaluate --ignore-not-found