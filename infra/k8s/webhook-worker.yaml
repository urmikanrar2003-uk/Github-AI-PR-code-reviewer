apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webhook-worker
  template:
    metadata:
      labels:
        app: webhook-worker
    spec:
      containers:
        - name: webhook-worker
          image:  022278165950.dkr.ecr.us-east-1.amazonaws.com/webhook:latest
          command: ["celery", "-A", "worker", "worker", "--loglevel=info", "-Q", "webhook"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["celery", "-A", "worker", "inspect", "ping", "--timeout=10"]
            initialDelaySeconds: 60
            periodSeconds: 120
            timeoutSeconds: 30
            failureThreshold: 3