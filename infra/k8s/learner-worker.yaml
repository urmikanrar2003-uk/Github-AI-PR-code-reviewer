apiVersion: apps/v1
kind: Deployment
metadata:
  name: learner-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: learner-worker
  template:
    metadata:
      labels:
        app: learner-worker
    spec:
      containers:
        - name: learner-worker
          image: 022278165950.dkr.ecr.us-east-1.amazonaws.com/learner:latest
          command: ["celery", "-A", "worker", "worker", "--loglevel=info", "-Q", "learning"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["celery", "-A", "worker", "inspect", "ping", "--timeout=10"]
            initialDelaySeconds: 60
            periodSeconds: 120
            timeoutSeconds: 30
            failureThreshold: 3